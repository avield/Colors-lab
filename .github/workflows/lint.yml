name: Lint Colors App

on:
  push:
    branches: [ "Automated-Linting" ]
  pull_request:
    branches: [ "Automated-Linting" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x] 

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run all linters
        run: npm run lint
